name: "Tour: Sync Tournaments"

on:
  workflow_dispatch:
  schedule:
    - cron: '0 16 * * *'

permissions:
  contents: write

concurrency:
  group: tournament-config-sync
  cancel-in-progress: false
  queue: max

jobs:
  sync:
    runs-on: ubuntu-latest
    outputs:
      configSha: ${{ steps.config_commit.outputs.sha }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v7
        with:
          ref: ${{ github.ref_name }}

      - name: Setup Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.10'

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: pip install requests

      - name: Discover Tournaments
        id: process_data
        env:
          PYTHONUNBUFFERED: "1"
          TZ: Asia/Shanghai
          FANDOM_BOT_USERNAME: ${{ secrets.FANDOM_BOT_USERNAME }}
          FANDOM_BOT_PASSWORD: ${{ secrets.FANDOM_BOT_PASSWORD }}
        run: python .github/scripts/syncTours.py

      - name: Validate TournamentConfig
        run: node .github/scripts/validateTournamentConfig.js config/TournamentConfig.json

      - name: Commit and Push Config
        id: auto_commit
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "${{ steps.process_data.outputs.commit_msg }}"
          file_pattern: 'config/TournamentConfig.json'

      - name: Capture Config Commit
        id: config_commit
        shell: bash
        run: echo "sha=$(git rev-parse HEAD)" >> "${GITHUB_OUTPUT}"

  apply:
    needs: sync
    uses: ./.github/workflows/kv.yml
    with:
      clear: false
      reconcile: true
      configRef: ${{ needs.sync.outputs.configSha }}
    secrets: inherit
