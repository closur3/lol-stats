name: "Tour: Sync Tournaments"

on:
  workflow_dispatch:
  schedule:
    - cron: '0 16 * * *'

permissions:
  actions: write
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    concurrency:
      group: repository-write-${{ github.ref }}
      cancel-in-progress: false
      queue: max

    steps:
      - name: Checkout repo
        uses: actions/checkout@v7
        with:
          ref: ${{ github.ref_name }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Discover Tournaments
        id: process_data
        env:
          PYTHONUNBUFFERED: "1"
          TZ: Asia/Shanghai
          FANDOM_BOT_USERNAME: ${{ secrets.FANDOM_BOT_USERNAME }}
          FANDOM_BOT_PASSWORD: ${{ secrets.FANDOM_BOT_PASSWORD }}
        run: python .github/scripts/syncTours.py

      - name: Commit and Push Config
        id: auto_commit
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "${{ steps.process_data.outputs.commit_msg }}"
          file_pattern: 'config/TournamentConfig.json'

      - name: Apply Config
        if: steps.auto_commit.outputs.changes_detected == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          config_sha="$(git rev-parse HEAD)"
          gh workflow run kv.yml \
            --ref "${GITHUB_REF_NAME}" \
            -f clear=false \
            -f reconcile=true

          run_id=""
          for _ in $(seq 1 30); do
            run_id="$(gh run list \
              --workflow kv.yml \
              --branch "${GITHUB_REF_NAME}" \
              --event workflow_dispatch \
              --commit "${config_sha}" \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId // empty')"
            [[ -n "${run_id}" ]] && break
            sleep 2
          done
          [[ -n "${run_id}" ]] || { echo "Unable to locate dispatched kv.yml run."; exit 1; }
          gh run watch "${run_id}" --exit-status
