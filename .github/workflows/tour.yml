name: "Tour: Sync Tournaments"

on:
  workflow_dispatch:
  schedule:
    - cron: '0 16 * * *'

permissions:
  actions: write
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      active_config_hash: ${{ steps.base_hashes.outputs.active_config_hash }}
      active_dropped_slugs: ${{ steps.process_data.outputs.active_dropped_slugs }}
      active_updated_slugs: ${{ steps.process_data.outputs.active_updated_slugs }}
      archive_config_hash: ${{ steps.base_hashes.outputs.archive_config_hash }}
      commit_msg: ${{ steps.process_data.outputs.commit_msg }}
      membership_changed: ${{ steps.process_data.outputs.membership_changed }}
      worker_cron_required: ${{ steps.process_data.outputs.worker_cron_required }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v7

      - name: Capture Config base hashes
        id: base_hashes
        shell: bash
        run: |
          set -euo pipefail
          echo "active_config_hash=$(sha256sum config/ConfigActive.json | awk '{print $1}')" >> "${GITHUB_OUTPUT}"
          echo "archive_config_hash=$(sha256sum config/ConfigArchive.json | awk '{print $1}')" >> "${GITHUB_OUTPUT}"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Discover Tournaments
        id: process_data
        env:
          PYTHONUNBUFFERED: "1"
          TZ: Asia/Shanghai
          FANDOM_BOT_USERNAME: ${{ secrets.FANDOM_BOT_USERNAME }}
          FANDOM_BOT_PASSWORD: ${{ secrets.FANDOM_BOT_PASSWORD }}
        run: python .github/scripts/syncTours.py

      - name: Upload Config candidate
        uses: actions/upload-artifact@v7
        with:
          name: tournament-config-candidate
          path: config
          if-no-files-found: error
          retention-days: 1

  backup_before_transition:
    needs: discover
    if: needs.discover.outputs.membership_changed == 'true'
    uses: ./.github/workflows/backup.yml
    secrets: inherit
    permissions:
      contents: write

  commit_config:
    needs:
      - discover
      - backup_before_transition
    if: >-
      always()
      && needs.discover.result == 'success'
      && (needs.backup_before_transition.result == 'success' || needs.backup_before_transition.result == 'skipped')
    runs-on: ubuntu-latest
    concurrency:
      group: repository-write-${{ github.ref }}
      cancel-in-progress: false
      queue: max

    steps:
      - name: Checkout latest branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.ref_name }}

      - name: Verify Config base hashes
        env:
          EXPECTED_ACTIVE_HASH: ${{ needs.discover.outputs.active_config_hash }}
          EXPECTED_ARCHIVE_HASH: ${{ needs.discover.outputs.archive_config_hash }}
        shell: bash
        run: |
          set -euo pipefail
          current_active_hash="$(sha256sum config/ConfigActive.json | awk '{print $1}')"
          current_archive_hash="$(sha256sum config/ConfigArchive.json | awk '{print $1}')"
          [[ "${current_active_hash}" == "${EXPECTED_ACTIVE_HASH}" ]] || { echo "ConfigActive changed after discovery."; exit 1; }
          [[ "${current_archive_hash}" == "${EXPECTED_ARCHIVE_HASH}" ]] || { echo "ConfigArchive changed after discovery."; exit 1; }

      - name: Download Config candidate
        uses: actions/download-artifact@v8
        with:
          name: tournament-config-candidate
          path: candidate-config

      - name: Install Config candidate
        shell: bash
        run: |
          set -euo pipefail
          [[ -s candidate-config/ConfigActive.json ]] || { echo "Missing candidate ConfigActive.json"; exit 1; }
          [[ -s candidate-config/ConfigArchive.json ]] || { echo "Missing candidate ConfigArchive.json"; exit 1; }
          cp candidate-config/ConfigActive.json config/ConfigActive.json
          cp candidate-config/ConfigArchive.json config/ConfigArchive.json

      - name: Commit and Push Config
        id: auto_commit
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "${{ needs.discover.outputs.commit_msg }}"
          file_pattern: 'config/ConfigActive.json config/ConfigArchive.json'

      - name: Persist Config and wait for runtime transition
        if: steps.auto_commit.outputs.changes_detected == 'true'
        env:
          ACTIVE_DROPPED_SLUGS: ${{ needs.discover.outputs.active_dropped_slugs }}
          ACTIVE_UPDATED_SLUGS: ${{ needs.discover.outputs.active_updated_slugs }}
          GH_TOKEN: ${{ github.token }}
          WORKER_CRON_REQUIRED: ${{ needs.discover.outputs.worker_cron_required }}
        shell: bash
        run: |
          set -euo pipefail
          config_sha="$(git rev-parse HEAD)"
          gh workflow run kv.yml \
            --ref "${GITHUB_REF_NAME}" \
            -f clear=false \
            -f run_worker_cron="${WORKER_CRON_REQUIRED}" \
            -f active_updated_slugs="${ACTIVE_UPDATED_SLUGS}" \
            -f active_dropped_slugs="${ACTIVE_DROPPED_SLUGS}"

          run_id=""
          for _ in $(seq 1 30); do
            run_id="$(gh run list \
              --workflow kv.yml \
              --branch "${GITHUB_REF_NAME}" \
              --event workflow_dispatch \
              --commit "${config_sha}" \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId // empty')"
            [[ -n "${run_id}" ]] && break
            sleep 2
          done
          [[ -n "${run_id}" ]] || { echo "Unable to locate dispatched kv.yml run."; exit 1; }
          gh run watch "${run_id}" --exit-status
