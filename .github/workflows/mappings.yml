name: "Mappings: Sync Aliases"

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'

jobs:
  mappings:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Sync Aliases
        id: process_data
        env:
          PYTHONUNBUFFERED: "1"
          FANDOM_BOT_USERNAME: ${{ secrets.FANDOM_BOT_USERNAME }}
          FANDOM_BOT_PASSWORD: ${{ secrets.FANDOM_BOT_PASSWORD }}
        run: python .github/scripts/syncMappings.py

      - name: Commit and Push
        id: auto_commit
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "${{ steps.process_data.outputs.commit_msg }}"
          file_pattern: 'config/ConfigTeams.json config/leagues.json'

      - name: Trigger KV Persist
        if: steps.auto_commit.outputs.changes_detected == 'true'
        run: |
          set -euo pipefail
          curl -fsSL -X POST \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/kv.yml/dispatches \
            -d "{\"ref\":\"${{ github.ref_name }}\"}"
