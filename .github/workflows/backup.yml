name: "Backup: Export Markdown"

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v7

      - name: Export Markdown
        env:
          WORKER_URL: "https://lol-stats.closur3.workers.dev/backup"
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
        run: node .github/scripts/exportMarkdownBackup.js
          NODE
        shell: bash

      - name: Build Commit Message
        id: commit_meta
        shell: bash
        run: |
          commit_msg=$(git status --porcelain -- 'markdown' | awk '
            {
              code=$1; f=$2;
              if (code=="R" || code=="RM" || code=="RD") f=$3;
              sub(".*/","",f); sub(/\.[^.]+$/, "", f);
              s=substr(code,1,1);
              if (code=="??" || s=="A") a[++na]=f;
              else if (s=="M") m[++nm]=f;
              else if (s=="D") d[++nd]=f;
              else m[++nm]=f;
            }
            END {
              n=na+nm+nd
              if (n==0) { print "📁 Dump: no changes"; exit }
              out=""
              if (na>0) {
                add="+ "
                for (i=1;i<=na;i++) add=add (i>1?" / ":"") a[i]
                out=add
              }
              if (nm>0) {
                mod="~ "
                for (i=1;i<=nm;i++) mod=mod (i>1?" / ":"") m[i]
                out=out (length(out)>0?" | ":"") mod
              }
              if (nd>0) {
                del="- "
                for (i=1;i<=nd;i++) del=del (i>1?" / ":"") d[i]
                out=out (length(out)>0?" | ":"") del
              }
              print "📁 Dump: " out
            }')
          echo "commit_msg=$commit_msg" >> "$GITHUB_OUTPUT"

      - name: Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "${{ steps.commit_meta.outputs.commit_msg }}"
          file_pattern: "markdown/*.md"
