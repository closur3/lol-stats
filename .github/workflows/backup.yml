name: "Backup: Export Markdown"

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      includeArchive:
        description: "Include archive snapshots"
        type: boolean
        required: false
        default: false

jobs:
  backup:
    runs-on: ubuntu-latest
    concurrency:
      group: repository-write-${{ github.ref }}
      cancel-in-progress: false
      queue: max
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v7
        with:
          ref: ${{ github.ref_name }}

      - name: Export and commit Markdown
        uses: ./.github/actions/markdown-backup
        with:
          adminSecret: ${{ secrets.ADMIN_SECRET }}
          workerUrl: ${{ vars.WORKER_URL }}
          includeArchive: ${{ inputs.includeArchive }}
