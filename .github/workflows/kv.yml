name: "Config: Persist KV"

on:
  workflow_dispatch:
    inputs:
      clear:
        description: "Delete all KV keys before writing configs"
        required: true
        default: false
        type: boolean
      reconcile:
        description: "Reconcile Worker runtime after persist (always runs after clear)"
        required: false
        default: false
        type: boolean

jobs:
  persist:
    runs-on: ubuntu-latest
    concurrency:
      group: worker-runtime-${{ github.ref }}
      cancel-in-progress: false
      queue: max
    steps:
      - name: Checkout repo
        uses: actions/checkout@v7

      - name: Validate runtime reconcile config
        if: inputs.clear == true || inputs.reconcile == true
        env:
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
          WORKER_URL: ${{ vars.WORKER_URL }}
        run: |
          set -euo pipefail
          [[ -n "${ADMIN_SECRET}" ]] || { echo "Missing ADMIN_SECRET."; exit 1; }
          [[ -n "${WORKER_URL}" ]] || { echo "Missing WORKER_URL variable."; exit 1; }

      - name: Persist TournamentConfig
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail

          if [[ -z "${CLOUDFLARE_API_TOKEN}" || -z "${CLOUDFLARE_ACCOUNT_ID}" ]]; then
            echo "Missing Cloudflare KV envs."
            exit 1
          fi

          CLOUDFLARE_KV_NAMESPACE_ID="$(awk '/binding = "lol-stats-kv"/ { getline; gsub(/"/, "", $3); print $3 }' wrangler.toml)"
          [[ -n "${CLOUDFLARE_KV_NAMESPACE_ID}" ]] || { echo "Missing lol-stats-kv namespace id in wrangler.toml."; exit 1; }

          clear_all_keys() {
            while true; do
              local list_response
              list_response="$(
                curl -fsSL \
                  "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/storage/kv/namespaces/${CLOUDFLARE_KV_NAMESPACE_ID}/keys?limit=1000" \
                  -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              )"
              [[ "$(echo "${list_response}" | jq -r '.success')" == "true" ]] || { echo "${list_response}" | jq -c '.errors'; exit 1; }

              local keys
              keys="$(echo "${list_response}" | jq -c '[.result[].name]')"
              local count
              count="$(echo "${keys}" | jq 'length')"
              if [[ "${count}" -eq 0 ]]; then
                echo "KV namespace is empty."
                break
              fi

              echo "Deleting ${count} KV keys..."
              local delete_response
              delete_response="$(
                curl -fsSL -X POST \
                  "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/storage/kv/namespaces/${CLOUDFLARE_KV_NAMESPACE_ID}/bulk/delete" \
                  -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
                  -H "Content-Type: application/json" \
                  -d "${keys}"
              )"
              [[ "$(echo "${delete_response}" | jq -r '.success')" == "true" ]] || { echo "${delete_response}" | jq -c '.errors'; exit 1; }
            done
          }

          put_config() {
            local key="$1"
            local file="$2"
            [[ -s "${file}" ]] || { echo "Missing config file: ${file}"; exit 1; }
            curl -fsSL -X PUT \
              "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/storage/kv/namespaces/${CLOUDFLARE_KV_NAMESPACE_ID}/values/${key}" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              --data-binary @"${file}" > /dev/null
            echo "${key} updated in Cloudflare KV."
          }

          if [[ "${{ inputs.clear }}" == "true" ]]; then
            clear_all_keys
          fi

          put_config "TournamentConfig" "config/TournamentConfig.json"

      - name: Reconcile Worker runtime
        if: inputs.clear == true || inputs.reconcile == true
        env:
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
          WORKER_URL: ${{ vars.WORKER_URL }}
        run: |
          set -euo pipefail
          [[ -n "${ADMIN_SECRET}" ]] || { echo "Missing ADMIN_SECRET."; exit 1; }
          [[ -n "${WORKER_URL}" ]] || { echo "Missing WORKER_URL variable."; exit 1; }

          print_worker_body() {
            local body_file="$1"
            if [[ -s "${body_file}" ]]; then
              cat "${body_file}"
              printf '\n'
            fi
          }

          post_worker() {
            local url="$1"
            shift
            local body_file
            body_file="$(mktemp)"
            local status
            if ! status="$(curl -sSL --show-error -X POST "${url}" \
              -H "Authorization: Bearer ${ADMIN_SECRET}" \
              "$@" \
              -o "${body_file}" \
              -w '%{http_code}')"; then
              print_worker_body "${body_file}"
              rm -f "${body_file}"
              return 1
            fi
            print_worker_body "${body_file}"
            rm -f "${body_file}"
            [[ "${status}" == "200" ]] || { echo "Worker returned HTTP ${status}."; return 1; }
          }

          post_worker "${WORKER_URL}/reconcile-tournaments"
