name: "Config: Persist KV"

on:
  workflow_call:
    inputs:
      clear:
        required: true
        type: boolean
      reconcile:
        required: true
        type: boolean
      configRef:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      clear:
        description: "Delete all KV keys before writing configs"
        required: true
        default: false
        type: boolean
      reconcile:
        description: "Reconcile Worker runtime after persist (always runs after clear)"
        required: false
        default: false
        type: boolean

jobs:
  persist:
    runs-on: ubuntu-latest
    concurrency:
      group: worker-runtime
      cancel-in-progress: false
      queue: max
    steps:
      - name: Checkout repo
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.configRef || github.event.repository.default_branch }}

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: '24'

      - name: Validate TournamentConfig
        run: node .github/scripts/validateTournamentConfig.js config/TournamentConfig.json

      - name: Validate runtime reconcile config
        if: inputs.clear == true || inputs.reconcile == true
        env:
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
          WORKER_URL: ${{ vars.WORKER_URL }}
        run: |
          set -euo pipefail
          [[ -n "${ADMIN_SECRET}" ]] || { echo "Missing ADMIN_SECRET."; exit 1; }
          [[ -n "${WORKER_URL}" ]] || { echo "Missing WORKER_URL variable."; exit 1; }

      - name: Persist TournamentConfig
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail

          if [[ -z "${CLOUDFLARE_API_TOKEN}" || -z "${CLOUDFLARE_ACCOUNT_ID}" ]]; then
            echo "Missing Cloudflare KV envs."
            exit 1
          fi

          CLOUDFLARE_KV_NAMESPACE_ID="$(awk '/binding = "lol-stats-kv"/ { getline; gsub(/"/, "", $3); print $3 }' wrangler.toml)"
          [[ -n "${CLOUDFLARE_KV_NAMESPACE_ID}" ]] || { echo "Missing lol-stats-kv namespace id in wrangler.toml."; exit 1; }

          clear_all_keys() {
            while true; do
              local list_response
              list_response="$(
                curl -fsSL \
                  "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/storage/kv/namespaces/${CLOUDFLARE_KV_NAMESPACE_ID}/keys?limit=1000" \
                  -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              )"
              [[ "$(echo "${list_response}" | jq -r '.success')" == "true" ]] || { echo "${list_response}" | jq -c '.errors'; exit 1; }

              local keys
              keys="$(echo "${list_response}" | jq -c '[.result[].name]')"
              local count
              count="$(echo "${keys}" | jq 'length')"
              if [[ "${count}" -eq 0 ]]; then
                echo "KV namespace is empty."
                break
              fi

              echo "Deleting ${count} KV keys..."
              local delete_response
              delete_response="$(
                curl -fsSL -X POST \
                  "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/storage/kv/namespaces/${CLOUDFLARE_KV_NAMESPACE_ID}/bulk/delete" \
                  -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
                  -H "Content-Type: application/json" \
                  -d "${keys}"
              )"
              [[ "$(echo "${delete_response}" | jq -r '.success')" == "true" ]] || { echo "${delete_response}" | jq -c '.errors'; exit 1; }
            done
          }

          write_config() {
            local key="$1"
            local file="$2"
            [[ -s "${file}" ]] || { echo "Missing config file: ${file}"; exit 1; }
            local write_response
            write_response="$(
              curl -fsSL -X PUT \
                "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/storage/kv/namespaces/${CLOUDFLARE_KV_NAMESPACE_ID}/values/${key}" \
                -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
                -H "Content-Type: application/json" \
                --data-binary @"${file}"
            )"
            [[ "$(echo "${write_response}" | jq -r '.success')" == "true" ]] || { echo "${write_response}" | jq -c '.errors'; exit 1; }
            echo "${key} updated in Cloudflare KV."
          }

          document_digest() {
            local file="$1"
            jq -cS . "${file}" | sha256sum | awk '{print $1}'
          }

          sync_config() {
            local key="$1"
            local file="$2"
            [[ -s "${file}" ]] || { echo "Missing config file: ${file}"; exit 1; }

            local desired_digest
            desired_digest="$(document_digest "${file}")"

            local current_file
            current_file="$(mktemp)"
            local read_status
            if ! read_status="$(
              curl -sSL --show-error \
                "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/storage/kv/namespaces/${CLOUDFLARE_KV_NAMESPACE_ID}/values/${key}" \
                -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
                -o "${current_file}" \
                -w '%{http_code}'
            )"; then
              rm -f "${current_file}"
              return 1
            fi

            case "${read_status}" in
              200)
                local current_digest
                if ! current_digest="$(document_digest "${current_file}")"; then
                  echo "${key} contains invalid JSON and will be replaced."
                  rm -f "${current_file}"
                  write_config "${key}" "${file}"
                  return
                fi
                if [[ "${desired_digest}" == "${current_digest}" ]]; then
                  rm -f "${current_file}"
                  echo "${key} already matches repository config."
                  return
                fi
                ;;
              404)
                echo "${key} is missing from Cloudflare KV."
                ;;
              *)
                cat "${current_file}"
                printf '\n'
                rm -f "${current_file}"
                echo "Unable to read ${key} from Cloudflare KV: HTTP ${read_status}."
                return 1
                ;;
            esac

            rm -f "${current_file}"
            write_config "${key}" "${file}"
          }

          if [[ "${{ inputs.clear }}" == "true" ]]; then
            clear_all_keys
            write_config "TournamentConfig" "config/TournamentConfig.json"
          else
            sync_config "TournamentConfig" "config/TournamentConfig.json"
          fi

      - name: Reconcile Worker runtime
        if: inputs.clear == true || inputs.reconcile == true
        env:
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
          WORKER_URL: ${{ vars.WORKER_URL }}
        run: |
          set -euo pipefail
          [[ -n "${ADMIN_SECRET}" ]] || { echo "Missing ADMIN_SECRET."; exit 1; }
          [[ -n "${WORKER_URL}" ]] || { echo "Missing WORKER_URL variable."; exit 1; }

          EXPECTED_CONFIG_DIGEST="$(
            jq -er '.configDigest | select(type == "string" and test("^[a-f0-9]{64}$"))' config/TournamentConfig.json
          )"

          print_worker_body() {
            local body_file="$1"
            if [[ -s "${body_file}" ]]; then
              cat "${body_file}"
              printf '\n'
            fi
          }

          reconcile_worker() {
            local url="$1"
            local max_attempts=5
            for attempt in $(seq 1 "${max_attempts}"); do
              local body_file
              body_file="$(mktemp)"
              local status
              if ! status="$(curl -sSL --show-error -X POST "${url}" \
                -H "Authorization: Bearer ${ADMIN_SECRET}" \
                -H "X-Tournament-Config-Digest: ${EXPECTED_CONFIG_DIGEST}" \
                -o "${body_file}" \
                -w '%{http_code}')"; then
                print_worker_body "${body_file}"
                rm -f "${body_file}"
                if [[ "${attempt}" -eq "${max_attempts}" ]]; then
                  echo "Worker request failed after ${max_attempts} attempts."
                  return 1
                fi
                sleep 15
                continue
              fi

              print_worker_body "${body_file}"
              if [[ "${status}" == "200" ]]; then
                local actual_digest
                if ! actual_digest="$(jq -er '.configDigest' "${body_file}")"; then
                  rm -f "${body_file}"
                  echo "Worker response missing configDigest."
                  return 1
                fi
                rm -f "${body_file}"
                [[ "${actual_digest}" == "${EXPECTED_CONFIG_DIGEST}" ]] || {
                  echo "Worker reconciled unexpected TournamentConfig: ${actual_digest}."
                  return 1
                }
                return
              fi

              rm -f "${body_file}"
              if [[ "${status}" != "409" ]]; then
                echo "Worker returned HTTP ${status}."
                return 1
              fi
              if [[ "${attempt}" -eq "${max_attempts}" ]]; then
                echo "TournamentConfig did not reach Worker after ${max_attempts} attempts."
                return 1
              fi
              sleep 15
            done
          }

          reconcile_worker "${WORKER_URL}/reconcile-tournaments"
