name: "Config: Persist KV"

on:
  workflow_dispatch:
    inputs:
      clear:
        description: "Delete all KV keys before writing configs"
        required: true
        default: false
        type: boolean
      run_worker_cron:
        description: "Run the Worker cron after configs are persisted"
        required: false
        default: false
        type: boolean
      active_updated_slugs:
        description: "JSON array of Active slugs requiring force rebuild"
        required: false
        default: "[]"
        type: string
      active_dropped_slugs:
        description: "JSON array of non-archived Active slugs requiring runtime deletion"
        required: false
        default: "[]"
        type: string

jobs:
  persist:
    runs-on: ubuntu-latest
    concurrency:
      group: worker-runtime-${{ github.ref }}
      cancel-in-progress: false
      queue: max
    steps:
      - name: Checkout repo
        uses: actions/checkout@v7

      - name: Validate inputs
        run: |
          set -euo pipefail
          if [[ "${{ inputs.clear }}" == "true" && "${{ inputs.run_worker_cron }}" == "true" ]]; then
            echo "clear and run_worker_cron cannot both be true. After clearing KV, rebuild Active with Force and Archive with Archive Rebuild."
            exit 1
          fi

      - name: Persist KV configs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail

          if [[ -z "${CLOUDFLARE_API_TOKEN}" || -z "${CLOUDFLARE_ACCOUNT_ID}" ]]; then
            echo "Missing Cloudflare KV envs."
            exit 1
          fi

          CLOUDFLARE_KV_NAMESPACE_ID="$(awk '/binding = "lol-stats-kv"/ { getline; gsub(/"/, "", $3); print $3 }' wrangler.toml)"
          [[ -n "${CLOUDFLARE_KV_NAMESPACE_ID}" ]] || { echo "Missing lol-stats-kv namespace id in wrangler.toml."; exit 1; }

          clear_all_keys() {
            while true; do
              local list_response
              list_response="$(
                curl -fsSL \
                  "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/storage/kv/namespaces/${CLOUDFLARE_KV_NAMESPACE_ID}/keys?limit=1000" \
                  -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              )"
              [[ "$(echo "${list_response}" | jq -r '.success')" == "true" ]] || { echo "${list_response}" | jq -c '.errors'; exit 1; }

              local keys
              keys="$(echo "${list_response}" | jq -c '[.result[].name]')"
              local count
              count="$(echo "${keys}" | jq 'length')"
              if [[ "${count}" -eq 0 ]]; then
                echo "KV namespace is empty."
                break
              fi

              echo "Deleting ${count} KV keys..."
              local delete_response
              delete_response="$(
                curl -fsSL -X POST \
                  "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/storage/kv/namespaces/${CLOUDFLARE_KV_NAMESPACE_ID}/bulk/delete" \
                  -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
                  -H "Content-Type: application/json" \
                  -d "${keys}"
              )"
              [[ "$(echo "${delete_response}" | jq -r '.success')" == "true" ]] || { echo "${delete_response}" | jq -c '.errors'; exit 1; }
            done
          }

          put_config() {
            local key="$1"
            local file="$2"
            [[ -s "${file}" ]] || { echo "Missing config file: ${file}"; exit 1; }
            curl -fsSL -X PUT \
              "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/storage/kv/namespaces/${CLOUDFLARE_KV_NAMESPACE_ID}/values/${key}" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              --data-binary @"${file}" > /dev/null
            echo "${key} updated in Cloudflare KV."
          }

          if [[ "${{ inputs.clear }}" == "true" ]]; then
            clear_all_keys
          fi

          put_config "ConfigActive" "config/ConfigActive.json"
          put_config "ConfigArchive" "config/ConfigArchive.json"

      - name: Apply Worker transition
        if: >-
          inputs.run_worker_cron == true
          || inputs.active_updated_slugs != '[]'
          || inputs.active_dropped_slugs != '[]'
        env:
          ACTIVE_DROPPED_SLUGS: ${{ inputs.active_dropped_slugs }}
          ACTIVE_UPDATED_SLUGS: ${{ inputs.active_updated_slugs }}
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
          WORKER_URL: ${{ vars.WORKER_URL }}
        run: |
          set -euo pipefail
          [[ -n "${ADMIN_SECRET}" ]] || { echo "Missing ADMIN_SECRET."; exit 1; }
          [[ -n "${WORKER_URL}" ]] || { echo "Missing WORKER_URL variable."; exit 1; }

          validate_slugs() {
            local value="$1"
            echo "${value}" | jq -e 'type == "array" and all(.[]; type == "string" and length > 0)' > /dev/null
          }
          validate_slugs "${ACTIVE_UPDATED_SLUGS}"
          validate_slugs "${ACTIVE_DROPPED_SLUGS}"

          print_worker_body() {
            local body_file="$1"
            if [[ -s "${body_file}" ]]; then
              cat "${body_file}"
              printf '\n'
            fi
          }

          post_worker() {
            local url="$1"
            shift
            local body_file
            body_file="$(mktemp)"
            local status
            if ! status="$(curl -sSL --show-error -X POST "${url}" \
              -H "Authorization: Bearer ${ADMIN_SECRET}" \
              "$@" \
              -o "${body_file}" \
              -w '%{http_code}')"; then
              print_worker_body "${body_file}"
              rm -f "${body_file}"
              return 1
            fi
            print_worker_body "${body_file}"
            rm -f "${body_file}"
            [[ "${status}" == "200" ]] || { echo "Worker returned HTTP ${status}."; return 1; }
          }

          if [[ "${{ inputs.run_worker_cron }}" == "true" ]]; then
            post_worker "${WORKER_URL}/run-cron"
          fi

          if [[ "$(echo "${ACTIVE_UPDATED_SLUGS}" | jq 'length')" -gt 0 ]]; then
            force_payload="$(jq -cn --argjson slugs "${ACTIVE_UPDATED_SLUGS}" '{slugs: $slugs}')"
            post_worker "${WORKER_URL}/force" \
              -H "Content-Type: application/json" \
              -d "${force_payload}"
          fi

          while IFS= read -r slug; do
            delete_payload="$(jq -cn --arg slug "${slug}" '{slug: $slug}')"
            post_worker "${WORKER_URL}/delete-active" \
              -H "Content-Type: application/json" \
              -d "${delete_payload}"
          done < <(echo "${ACTIVE_DROPPED_SLUGS}" | jq -r '.[]')
